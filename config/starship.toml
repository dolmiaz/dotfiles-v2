"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 1200
scan_timeout = 30

# ňĚŽ: ňá┤ŠëÇ / Git / ÚľőšÖ║šĺ░ňóâ / ňůąňŐŤŔĘśňĆĚ
format = '$username$hostname$directory$git_branch$git_status$git_state$git_metrics${custom.git_user}$package$nodejs$python$ruby$rust$golang$direnv$docker_context$conda$container$character'

# ňĆ│: šŤ┤ňëŹŃé│Ńâ×Ńâ│ŃâëŃü«šÁÉŠ×ť / ň«čŔíîŠÖéÚľô / ŃâÉŃââŃé»Ńé░ŃâęŃéŽŃâ│ŃâëŃéŞŃâžŃâľ
right_format = '$status$cmd_duration$jobs'

continuation_prompt = 'ÔłÖ '

[character]
success_symbol = '[ÔŁ»](bold green)'
error_symbol = '[ÔťŚ](bold red)'
vimcmd_symbol = '[ÔŁ«](bold green)'

[username]
format = '[$user]($style)@'
style_user = 'yellow bold'
style_root = 'red bold'
show_always = false

[hostname]
format = '[$ssh_symbol$hostname]($style) '
style = 'cyan bold'
ssh_only = true
trim_at = '.local'

[directory]
format = '[$path]($style)[$read_only]($read_only_style) '
style = 'cyan bold'
repo_root_style = 'cyan bold underline'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) '
truncation_length = 3
truncation_symbol = 'ÔÇŽ/'
truncate_to_repo = true
read_only = ' ´Çú'
read_only_style = 'red'

[git_branch]
symbol = '´Éś '
format = '[$symbol$branch(:$remote_branch)]($style) '
style = 'purple bold'
truncation_length = 32
truncation_symbol = 'ÔÇŽ'

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'red bold'
conflicted = 'Ôëá${count}'
ahead = 'Ôçí${count}'
behind = 'Ôçú${count}'
diverged = 'ÔçĽÔçí${ahead_count}Ôçú${behind_count}'
untracked = '?${count}'
stashed = 'Ôëí${count}'
modified = '!${count}'
staged = '+${count}'
renamed = '┬╗${count}'
deleted = 'Ôťś${count}'
typechanged = 'Ôć╗${count}'
up_to_date = ''

[git_state]
format = '[$state( $progress_current/$progress_total)]($style) '
style = 'yellow bold'

[git_metrics]
disabled = false
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
added_style = 'green bold'
deleted_style = 'red bold'
only_nonzero_diffs = true

[custom.git_user]
description = 'Git identity used in this repository'
command = 'git config --get user.name'
when = 'git config --get user.name >/dev/null 2>&1'
require_repo = true
symbol = '­čĹĄ '
format = '[$symbol$output]($style) '
style = 'blue bold'

[package]
symbol = 'ˇ░ĆŚ '
format = '[$symbol$version]($style) '
style = 'bold 208'
display_private = false

[nodejs]
disabled = false
symbol = 'ţťś '
format = '[$symbol$version]($style) '
style = 'green bold'
detect_extensions = ['js', 'mjs', 'cjs', 'ts', 'mts', 'cts']
detect_files = ['package.json', '.node-version', '.nvmrc', 'package-lock.json', 'pnpm-lock.yaml', 'yarn.lock', 'bun.lock', 'bun.lockb']
detect_folders = ['node_modules']

[python]
symbol = 'ţť╝ '
format = '[${symbol}${pyenv_prefix}${version}( \($virtualenv\))]($style) '
style = 'yellow bold'
python_binary = ['python3', 'python']
detect_extensions = ['py', 'ipynb']
detect_files = ['pyproject.toml', 'requirements.txt', 'setup.py', 'tox.ini', 'Pipfile', '__init__.py', '.python-version']
detect_folders = []

[ruby]
symbol = 'ţ×Ĺ '
format = '[$symbol$version]($style) '
style = 'red bold'

[rust]
symbol = 'ţ×Ę '
format = '[$symbol$version]($style) '
style = 'red bold'

[golang]
symbol = 'ţśž '
format = '[$symbol$version( $mod_version)]($style) '
style = 'cyan bold'

[direnv]
disabled = false
symbol = 'ˇ░ÖĘ '
format = '[$symbol$loaded/$allowed]($style) '
style = 'orange bold'
allowed_msg = 'ok'
not_allowed_msg = 'no'
denied_msg = 'deny'
loaded_msg = 'on'
unloaded_msg = 'off'

[docker_context]
symbol = '´îł '
format = '[$symbol$context]($style) '
style = 'blue bold'
only_with_files = true

[conda]
symbol = '´äî '
format = '[$symbol$environment]($style) '
style = 'green bold'
ignore_base = true
truncation_length = 1

[container]
symbol = '´ĺĚ'
format = '[$symbol $name]($style) '
style = 'red bold dimmed'

[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = 'ÔťŚ '
not_found_symbol = 'nf '
not_executable_symbol = 'nx '
sigint_symbol = 'int '
signal_symbol = 'sig '
style = 'red bold'

[cmd_duration]
min_time = 1000
format = '[took $duration]($style) '
style = 'yellow bold'
show_milliseconds = false

[jobs]
symbol = 'ÔťŽ'
format = '[$symbol$number]($style) '
style = 'blue bold'
symbol_threshold = 1
number_threshold = 1
